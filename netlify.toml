[build]
  base = "afro-eats"
  command = "npm run build"
  publish = "build"

# Redirect all routes to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables for production
[build.environment]
  # React production build
  NODE_ENV = "production"
  
  # API Configuration
  REACT_APP_API_BASE_URL = "https://api.orderdabaly.com"
  # REACT_APP_STRIPE_PUBLISHABLE_KEY is set in Netlify dashboard environment variables for security
  
  # Build optimizations
  GENERATE_SOURCEMAP = "false"
  CI = "true"
  # Prevents CRA from inlining the runtime chunk, which would require 'unsafe-inline' in CSP
  INLINE_RUNTIME_CHUNK = "false"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Content Security Policy
    # - script-src: self + Stripe.js + Google Maps (no 'unsafe-inline' — INLINE_RUNTIME_CHUNK=false keeps runtime as a file)
    # - style-src: 'unsafe-inline' needed for Tailwind inline styles and React Toastify
    # - connect-src: API + Stripe + Google Maps + WebSocket (Socket.io)
    # - frame-src: Stripe payment iframes
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://js.stripe.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.orderdabaly.com https://api.stripe.com https://maps.googleapis.com https://maps.gstatic.com wss://api.orderdabaly.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

    # Permissions Policy — disable APIs the app does not use
    Permissions-Policy = "accelerometer=(), camera=(), fullscreen=(self), geolocation=(self), gyroscope=(), interest-cohort=(), magnetometer=(), microphone=(), payment=(self), usb=()"

    # HTML pages and SPA routes must never be cached aggressively —
    # if they were, browsers would keep old JS hash references after a deploy.
    # Hashed static files (/static/js/*, /static/css/*) get the long cache below.
    Cache-Control = "public, no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    # Don't cache HTML files
    Cache-Control = "no-cache"

[[headers]]
  for = "/static/js/*"
  [headers.values]
    # Cache JavaScript files for 1 year
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/css/*"
  [headers.values]
    # Cache CSS files for 1 year  
    Cache-Control = "public, max-age=31536000, immutable"